<!DOCTYPE html>
<html>

<head>
    <!--Just defines the character type-->
    <meta charset="utf-8" />

    <!--Loads the styling and library for FullCalendar-->
    <!--This is where we get the FullCalendar Object-->
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css" rel="stylesheet">
    <link href="Stylesheet1.css" rel="stylesheet">
    <link href="Calendar.css" rel="stylesheet">
    <link href="Events.css" rel="stylesheet">
    
    <!--CSS for the clock display-->
    <style>
        @font-face {
            font-family: 'Digital-7';
            src: url('../digital-7 (mono).ttf');
        }
        #myClock {
            position: relative;
            display: inline-block;
            font-family: 'Digital-7', monospace;
            font-size: 36px;
            color: rgb(0, 74, 158);
            background-color: rgb(185, 255, 218);
            padding: 10px;
            border-radius: 5px;
            border: 5px solid rgb(0, 38, 82);
        }
    </style>

    <!--Layout helpers (rows, inputs, draggable-pool, center-text)-->
    <style>

        .row {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        .inputs, .inputs form {
            width: 100%;
            padding: 0 5px;
            box-sizing: border-box;
        }

        .draggable-pool-container {
            padding: 6px 0;
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        #draggable-pool {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .center-text {
            text-align: center;
        }

    </style>
</head>

<body>

    <div class="container">
        <div class="Left side">


            <!--Title and Clock Containers-->
            <div class="Cally-container">
                <div><text class="cursive-text"><b>Cally</b>&nbsp;</text></div>
                <div><text class="Main-text"><b> - The Study Assistant!</b></text></div>
            </div>
            <div class="NewClock-container">
                <div id="myClock" style="font-size:32px; font-weight:bold;"></div>
            </div>
            <div class="NewClock-container">
                <div class="center-text">
                    <a href="List_Mgr_Form.html" class="button-link">Go to List Manager</a>
                </div>
            </div>


            <!--Calendar Controls Container-->
            <div class="CallyControls-container">
            <!--Format: name, start-hour, end-hour, start date, end date, description
            Format: name, 0-1440minutes, 0-1440, 1/1/2026,  1/1/2026, description

            Input Fields
            I got the structure and animations from  https://codepen.io/teroauralinna/pen/rZZGpe-->
                <div class="inputs">
                    <div style="display: flex; gap: 10px; align-items: flex-start;">
                        <form novalidate>
                            <div class="row">
                                <div class="form-field">
                                    <div class="form-field__control">
                                        <label for="Event name" class="form-field__label">Event name</label>
                                        <input id="Event name" type="text" class="form-field__input" placeholder="e.g., Dr. Appointment"/>
                                    </div>
                                </div>
                            </div>

                            <div class="row">
                                <div class="form-field">
                                    <div class="form-field__control">
                                        <label for="Start time" class="form-field__label">Start time</label>
                                        <input id="Start time" type="Start time" class="form-field__input" placeholder="h:mm" />
                                    </div>
                                </div>
                                <button type="button" class="ampm-btn" onclick="toggleAmPm(this)">AM</button>
                                <div class="form-field">
                                    <div class="form-field__control">
                                        <label for="End time" class="form-field__label">End time</label>
                                        <input id="End time" type="End time" class="form-field__input" placeholder="h:mm"/>
                                    </div>
                                </div>
                                <button type="button" class="ampm-btn" onclick="toggleAmPm(this)">AM</button>
                            </div>

                            <div class="row">
                                <div class="form-field">
                                    <div class="form-field__control">
                                        <label for="Start Day" class="form-field__label">Start Day</label>
                                        <input id="Start Day" type="Start Day" class="form-field__input" placeholder="mm/dd/yyyy" />
                                    </div>
                                </div>
                                <div class="form-field">
                                    <div class="form-field__control">
                                        <label for="End Day" class="form-field__label">End Day</label>
                                        <input id="End Day" type="End Day" class="form-field__input" placeholder="mm/dd/yyyy" />
                                    </div>
                                </div>
                            </div>

                            <div class="row">
                                <div class="form-field">
                                    <div class="form-field__control">
                                        <label for="Description" class="form-field__label">Description</label>
                                        <textarea id="Description" class="form-field__input form-field__textarea"></textarea>
                                    </div>
                                </div>
                            </div>
                        </form>


                        <!-- Submit button and Drag element-->
                        <div class="submit-field">
                            <button type="button" class="sub-btn" onclick="trySubmit(this)">Submit</button>
                            <!--Draggable event chip-->
                            <div class="draggable-pool-container">
                                <div id="draggable-pool">
                                    <div id="event-chip" class="event-chip pending">
                                        <div class="chip-title" id="chip-title">No Event</div>
                                        <div class="chip-info" id="chip-info"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
            <!--Timer Controls Container-->
            <div class="timer-container">
                <!-- Label and input in minutes -->
                <div class="input-group">
                    <label for="durationInput">Enter Duration</label>
                    <input type="number" id="durationInput" placeholder="Minutes" min="1">
                </div>

                <!-- New Time Display -->
                <div id="timeDisplay">00:00</div>

                <!-- Linear progress bar (1/3 height) -->
                <div class="progress-bar-container">
                    <div id="progressBar"></div>
                </div>

                <!-- Controls/Buttons -->
                <div class="controls">
                    <button id="startBtn" class="img-btn">
                        <img src="../Start1.PNG" class="base-img" alt="Start">
                        <img src="../Start2.PNG" class="hover-img" alt="Start">
                    </button>
                    <button id="pauseBtn" class="img-btn">
                        <img src="../Pause1.PNG" class="base-img" alt="Pause">
                        <img src="../Pause2.PNG" class="hover-img" alt="Pause">
                    </button>
                    <button id="stopBtn" class="img-btn">
                        <img src="../Stop1.PNG" class="base-img" alt="Stop">
                        <img src="../Stop2.PNG" class="hover-img" alt="Stop">
                    </button>
                </div>
                <!--Alarm Sound File-->
                <audio id="alarm" src="../alarm.mp3" loop></audio>
            </div>
        </div>
        <!--JavaScript include file for Timer functionality-->
        <script src="../JavaScript1.js"></script>
        <!--Calendar-->
        <div class="Calendar">
            <div class="calendar-card">
                <div id="calendar"></div>
            </div>
        </div>
    </div>

    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>

    <!-- Animate text-->
    <script>

        // Helper function to set active/filled state on form fields
        const setActive = (el, active) => {
            const formField = el.parentNode.parentNode
            if (active) {
                formField.classList.add('form-field--is-active')
            } else {
                formField.classList.remove('form-field--is-active')
                el.value === '' ?
                    formField.classList.remove('form-field--is-filled') :
                    formField.classList.add('form-field--is-filled')
            }
        }
        // Makes the Elements animate on focus and blur
        [].forEach.call(
            document.querySelectorAll('.form-field__input, .form-field__textarea'),
            (el) => {
                el.onblur = () => {
                    setActive(el, false)
                }
                el.onfocus = () => {
                    setActive(el, true)
                }
            }
        )
        // Makes the textarea grow as you type, up to a max height of 200px (set in CSS)
        document.querySelectorAll('.form-field__textarea').forEach(el => {
            el.addEventListener('input', function () {
                this.style.height = '40px';
                this.style.height = this.scrollHeight + 'px';
            });
        });

        // Toggle AM/PM state on button click
        function toggleAmPm(btn) {
            if (btn.textContent === 'AM') {
                btn.textContent = 'PM';
                btn.classList.add('pm');
            } else {
                btn.textContent = 'AM';
                btn.classList.remove('pm');
            }
        }

        //Checks date, the built in system is 0 indexed for months.
        function isValidDate(year, month, day) {
            const date = new Date(year, month - 1, day);
            return date.getFullYear() === year &&
                date.getMonth() === month - 1 &&
                date.getDate() === day;
        }

        // Set if a field has an error, adding or removing the error class for styling
        function setError(id, hasError) {
            const el = document.getElementById(id);
            if (!el) return;
            const formField = el.parentNode.parentNode;
            if (hasError)
                formField.classList.add('form-field--is-error');
            else
                formField.classList.remove('form-field--is-error');
        }


        function updateChipLive() {

            const name = document.getElementById('Event name').value.trim();
            const startDay = document.getElementById('Start Day').value.trim();
            const endDay = document.getElementById('End Day').value.trim();
            const startTime = document.getElementById('Start time').value.trim();
            const endTime = document.getElementById('End time').value.trim();
            const description = document.getElementById('Description').value.trim();
            const ampmBtns = document.querySelectorAll('.ampm-btn');
            const startPer = ampmBtns[0].textContent.trim();
            const endPer = ampmBtns[1].textContent.trim();

            const chip = document.getElementById('event-chip');
            const chipTitle = document.getElementById('chip-title');
            const chipInfo = document.getElementById('chip-info');

            //Under 3 characters, pending state with basic info
            if (name.length < 3) {
                chip.className = 'event-chip pending';
                chip.removeAttribute('data-event');
                chip.dataset.csvRow = '';
                chipTitle.textContent = name.length > 0 ? name : 'No Event';
                chipInfo.textContent = '';
                return;
            }

            chipTitle.textContent = name;

            // Build labeled rows for whatever is filled in
            let infoHTML = '';
            if (startDay)
                infoHTML += `<div class="chip-row"><span class="chip-row-label">Date</span><span class="chip-row-value">${startDay}</span></div>`;
            if (startTime)
                infoHTML += `<div class="chip-row"><span class="chip-row-label">Time</span><span class="chip-row-value">${startTime} ${startPer}${endTime ? ' – ' + endTime + ' ' + endPer : ''}</span></div>`;
            if (description)
                infoHTML += `<div class="chip-row"><span class="chip-row-label">Note</span><span class="chip-row-value">${description.substring(0, 30)}${description.length > 30 ? '…' : ''}</span></div>`;

            chipInfo.innerHTML = infoHTML;
            // Build event data for FullCalendar dragging
            chip.className = 'event-chip ready';
            chip.setAttribute('data-event', JSON.stringify({ title: name }));
            chip.dataset.csvRow = `${name},0,0,${startDay || ''},${endDay || startDay || ''},${description}`;
        }

        //Live listener for inputs
        document.addEventListener('DOMContentLoaded', function () {
            document.querySelectorAll('.form-field__input, .form-field__textarea').forEach(el => {
                el.addEventListener('input', updateChipLive);
            });

            // Clear error highlight as soon as the user edits the field
            const startDayEl = document.getElementById('Start Day');
            if (startDayEl)
                startDayEl.addEventListener('input', () => setError('Start Day', false));
        });


        //Test for Events validation and submission
        let pendingEvent = null;
        function trySubmit(button) {

            // Clear any previous error state
            setError('Start Day', false);

            //Ironically, function validated by AI.
            const eventName = document.getElementById('Event name').value.trim();
            const startTime = document.getElementById('Start time').value.trim();
            let endTime = document.getElementById('End time').value.trim();
            const startDay = document.getElementById('Start Day').value.trim();
            let endDay = document.getElementById('End Day').value.trim();
            const description = document.getElementById('Description').value.trim();

            // Get the AM/PM buttons
            const ampmButtons = document.querySelectorAll('.ampm-btn');
            const startPeriod = ampmButtons[0].textContent.trim();
            const endPeriod = ampmButtons[1].textContent.trim();

            //Format: name, start-hour, end-hour, start date, end date, description
            //Format: name, 0-1440minutes, 0-1440, 1/1/2026,  1/1/2026, description
            //Note: Time is base 60, so lets just divide it by that later.

            //From here we can evaluate the data

            if (eventName == '')
                return 0; //Bad Name
            if (!(typeof eventName === 'string' || eventName instanceof String))
                return 0; //Bad Name
            if (eventName.length < 3)
                return 1; //Short Name

            if (startDay == '') {
                setError('Start Day', true);
                return 2;
            }
            if (!(typeof startDay === 'string' || startDay instanceof String)) {
                setError('Start Day', true);
                return 2;
            }

            //Check if date valid
            startParts = startDay.trim().split('/');
            if (startParts.length != 3) {

                startParts = startDay.trim().split('-');
                if (startParts.length != 3) {
                    setError('Start Day', true);
                    return 3; //Bad Date Format
                } else {
                    //Format is YYYY-MM-DD, so we need to validate the parts
                    month = parseInt(startParts[1]);
                    day = parseInt(startParts[2]);
                    year = parseInt(startParts[0]);

                    if (!isValidDate(year, month, day)) {
                        setError('Start Day', true);
                        return 3; //Bad Date Format - date doesn't exist
                    }
                }
            } else {

                // Format is MM/DD/YYYY, so we need to validate the parts
                month = parseInt(startParts[0]);
                day = parseInt(startParts[1]);
                year = parseInt(startParts[2]);

                if (!isValidDate(year, month, day)) {
                    setError('Start Day', true);
                    return 3; //Bad Date Format - date doesn't exist
                }
                startDateFormatted = `${startParts[2]}-${String(startParts[0]).padStart(2, '0')}-${String(startParts[1]).padStart(2, '0')}`;

            }

            if (endDay == '')
                endDay = startDay; //If no end day, set it to the start day

            if (!(typeof endDay === 'string' || endDay instanceof String))
                return 2; //Need to be placed

            endParts = endDay.trim().split('/');
            if (endDay != startDay)
                if (endParts.length != 3) {

                    endParts = endDay.trim().split('-');
                    if (endParts.length != 3) {
                        return 3; //Bad Date Format
                    } else {
                        //Format is YYYY-MM-DD, so we need to validate the parts
                        month = parseInt(endParts[2]);
                        day = parseInt(endParts[1]);
                        year = parseInt(endParts[0]);

                        if (!isValidDate(year, month, day))
                            return 3; //Bad Date Format - date doesn't exist

                    }
                } else {

                    // Format is MM/DD/YYYY, so we need to validate the parts
                    month = parseInt(endParts[0]);
                    day = parseInt(endParts[1]);
                    year = parseInt(endParts[2]);

                    if (!isValidDate(year, month, day))
                        return 3; //Bad Date Format - date doesn't exist

                    endDateFormatted = `${endParts[2]}-${String(endParts[0]).padStart(2, '0')}-${String(endParts[1]).padStart(2, '0')}`;

                }

            //Name, start date, end date checked
            let startTm = [0, 0];
            let endTm = [0, 0];

            if (startTime == '') {
                endTime = '';

            } else {
                if (typeof startTime === 'string' || startTime instanceof String)
                    startTm = startTime.trim().split(':');
                if (startTm.length != 2) {
                    return 4; //Bad Time Format
                } else {
                    startTm[0] = parseInt(startTm[0]);
                    startTm[1] = parseInt(startTm[1]);

                    if (startTm[0] == null || startTm[1] == null)
                        return 4; //Bad Time Format

                    if (startTm[0] > 12)
                        return 4; //Bad Time Format - Hour can't be above 12
                    if (startTm[1] > 59)
                        return 4; //Bad Time Format - Minute can't be above 59
                    if (startPeriod == 'PM' && startTm[0] !== 12) startTm[0] += 12; // skip 12 PM
                    if (startPeriod == 'AM' && startTm[0] === 12) startTm[0] = 0;   // fix 12 AM
                }
                if (typeof endTime === 'string' || endTime instanceof String)
                    endTm = endTime.trim().split(':');
                if (endTm.length != 2) {
                    return 4; //Bad Time Format

                } else {
                    endTm[0] = parseInt(endTm[0]);
                    endTm[1] = parseInt(endTm[1]);

                    if (endTm[0] == null || endTm[1] == null)
                        return 4; //Bad Time Format

                    if (endTm[0] > 12)
                        return 4; //Bad Time Format - Hour can't be above 12
                    if (endTm[1] > 59)
                        return 4; //Bad Time Format - Minute can't be above 59

                    if (endPeriod == 'PM')
                        endTm[0] += 12;
                }

            }

            //Name, start date, end date, start time, end time checked

            // All checks passed — store pending event and create draggable chip
            pendingEvent = `${eventName},${startTm[0] * 60 + startTm[1]},${endTm[0] * 60 + endTm[1]},${startDay},${endDay},${description}\n`;

            // Guard: if addEventToCSV isn't ready yet, retry after a short delay
            if (typeof window.addEventToCSV !== 'function') {
                console.warn('addEventToCSV not ready yet, retrying...');
                setTimeout(() => window.addEventToCSV(window.csvData, pendingEvent), 150);
            } else {
                window.addEventToCSV(window.csvData, pendingEvent);
            }


            // Clear all fields on success
            document.getElementById('Event name').value = '';
            document.getElementById('Start time').value = '';
            document.getElementById('End time').value = '';
            document.getElementById('Start Day').value = '';
            document.getElementById('End Day').value = '';
            document.getElementById('Description').value = '';

            // Reset the animated label states
            document.querySelectorAll('.form-field__input, .form-field__textarea').forEach(el => {
                setActive(el, false);
            });

            // Reset AM/PM buttons
            document.querySelectorAll('.ampm-btn').forEach(btn => {
                btn.textContent = 'AM';
                btn.classList.remove('pm');
            });

            //Reset Event chip
            const chip = document.getElementById('event-chip');
            chip.className = 'event-chip pending';
            chip.dataset.csvRow = '';
            chip.removeAttribute('data-event');

            document.getElementById('chip-title').textContent = 'No Event';
            document.getElementById('chip-info').textContent = '';

        }// End of trySubmit


    </script>

    <script src="Calendar.js"></script>

    <!--This starts the clock-->

    <script src="clockDisplay.js"></script>
    <script>
        startClock("myClock");
    </script>

    <div id="event-tooltip"></div>

</body>
</html>
